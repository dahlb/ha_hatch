set_alarm_weekdays:
  name: Set alarm weekdays
  description: Set which weekdays a Hatch alarm repeats on. Use an empty weekday list for a one-time alarm.
  target:
    entity:
      integration: ha_hatch
      domain: switch
  fields:
    weekdays:
      name: Weekdays
      description: Weekdays when the alarm should repeat.
      required: false
      selector:
        select:
          multiple: true
          mode: list
          sort: false
          options:
            - label: Monday
              value: monday
            - label: Tuesday
              value: tuesday
            - label: Wednesday
              value: wednesday
            - label: Thursday
              value: thursday
            - label: Friday
              value: friday
            - label: Saturday
              value: saturday
            - label: Sunday
              value: sunday
